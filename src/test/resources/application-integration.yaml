app:
  rate-limit:
    requests-per-minute: 100000
  card:
    default-expiry: P2Y
    expiry-job-interval: PT15M
  transaction:
    optimistic-lock-max-retries: 3
  kafka:
    topics:
      audit-events: card-audit-events-test

spring:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    consumer:
      auto-offset-reset: earliest
    producer:
      properties:
        spring.json.add.type.headers: false
  quartz:
    job-store-type: memory
    properties:
      org.quartz.jobStore.class: org.quartz.simpl.RAMJobStore

logging:
  level:
    com.nium.cardplatform: DEBUG
    org.hibernate.SQL: DEBUG